<div class="space-y-4">

  <h2 class="text-2xl font-bold text-white">
    {{ genre()?.name }}
  </h2>

  <div class="relative">

    <!-- Left -->
    <button
      (click)="previous()"
      class="absolute left-0 top-1/2 z-10 -translate-y-1/2 rounded-full bg-black/70 p-3 text-white hover:bg-black">
      ◀
    </button>

    <!-- Movies -->
    <div
      #slider
      class="flex gap-4 overflow-x-hidden scroll-smooth">

      @for (movie of movies(); track movie.id) {

        <div class="shrink-0 w-[220px]">
          <app-movie-card [movie]="movie" />
        </div>

      }

    </div>

    <!-- Right -->
    <button
      (click)="next()"
      class="absolute right-0 top-1/2 z-10 -translate-y-1/2 rounded-full bg-black/70 p-3 text-white hover:bg-black">
      ▶
    </button>

  </div>

</div>
