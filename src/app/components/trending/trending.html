<div class="flex flex-col space-y-4 items-center">
  <div
    class="w-full grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6"
  >
    @for (movie of TrendingMovies()?.results; track movie.id) {
      <app-movie-card [movie]="movie" />
    }
  </div>
  <div class="pages flex gap-2  ">
    @for(page of visiblePages();track page) {
  
    <span
      (click)="onClick(page)"
      class="px-3 py-2 rounded-xl cursor-pointer transition-colors"
      [class.bg-red-500]="pageNumber() === page"
      [class.bg-gray-500]="pageNumber() !== page"
    >
      {{ page }}
    </span>
}
 
  </div>
</div>
