<a
  [routerLink]="['/home/movies', movie()?.id]"
  class="block w-full"
>
  <div
    class="group relative w-full overflow-hidden rounded-2xl bg-zinc-900 shadow-lg transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl"
  >
    <!-- Poster -->
    <img
      class="h-[320px] w-full object-cover transition duration-500 group-hover:scale-110"
      [src]="'https://image.tmdb.org/t/p/w500' + movie()?.poster_path"
      [alt]="movie()?.title"
    />

    <!-- Overlay -->
    <div
      class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 transition duration-300 group-hover:opacity-100"
    >
      <div class="absolute bottom-0 p-4 text-white">
        <h2 class="line-clamp-1 text-lg font-bold">
          {{ movie()?.title }}
        </h2>

        <div class="mt-2 flex items-center gap-3 text-sm text-gray-300">
          <span>⭐ {{ movie()?.vote_average }}</span>
          <span>{{ movie()?.release_date }}</span>
          <span>{{ movie()?.original_language }}</span>
        </div>

        <p class="mt-3 line-clamp-3 text-sm text-gray-300">
          {{ movie()?.overview }}
        </p>
      </div>
    </div>
  </div>
</a>
