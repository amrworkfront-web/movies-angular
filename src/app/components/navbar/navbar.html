<nav
  class="sticky top-0 z-50 flex items-center justify-between bg-[#070B17] px-8 py-4 shadow-lg"
>
  <div class="flex items-center gap-2 text-3xl font-bold text-white">
    🎬
    <h1>Movie App</h1>
  </div>

  <div class="flex items-center gap-8 text-gray-300 font-medium">
    <a
      routerLink="/home"
      routerLinkActive="text-blue-500"
      [routerLinkActiveOptions]="{ exact: true }"
      class="transition hover:text-white"
    >
      Home
    </a>

    <a
      routerLink="/home/trend"
      routerLinkActive="text-blue-500"
      class="transition hover:text-white"
    >
      Trending
    </a>

    <a
      routerLink="/home/watchlist"
      routerLinkActive="text-blue-500"
      class="transition hover:text-white"
    >
      Watchlist
    </a>
  </div>

  <div class="relative w-80">
    <input
    [formControl]="searchControl"
      type="text"
      placeholder="Search movies..."
      class="w-full rounded-xl bg-[#1F232E] px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500"
    />

    @if (movies().length > 0) {
      <div
        class="absolute mt-2 w-full overflow-hidden rounded-xl bg-[#1A1D27] shadow-2xl max-h-96 overflow-y-auto"
      >
        @for(movie of movies(); track movie.id) {

<a [routerLink]="['movies/'+movie.id]">
          <div 
          class="flex cursor-pointer items-center gap-3 border-b border-gray-700 p-3 transition hover:bg-[#2B3040]"
        >
          <img
            [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path"
            [alt]="movie.title"
            class="h-16 w-12 rounded object-cover"
          />

          <div class="flex flex-col">
            <span class="font-medium text-white">
              {{ movie.title }}
            </span>

            <span class="text-sm text-gray-400">
              ⭐ {{ movie.vote_average }}
            </span>
          </div>
        </div>
</a>

        }
      </div>
    }
  </div>
</nav>
